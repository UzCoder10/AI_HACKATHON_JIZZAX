# Nihol production — nginx reverse proxy
# /etc/nginx/sites-available/nihol

upstream nihol_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name nihol.uz www.nihol.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nihol.uz www.nihol.uz;

    ssl_certificate     /etc/letsencrypt/live/nihol.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nihol.uz/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://nihol_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/chat/alloma/voice {
        proxy_pass http://nihol_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        client_max_body_size 20M;
    }

    location /api/voice/ {
        proxy_pass http://nihol_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        client_max_body_size 20M;
    }
}
