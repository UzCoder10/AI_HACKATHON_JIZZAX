# SafarAI production — nginx reverse proxy
# Frontend: Next.js static + SSR (port 3000)
# API: /api/* → Next.js server (bir xil upstream)

upstream safarai_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name safarai.uz www.safarai.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name safarai.uz www.safarai.uz;

    ssl_certificate     /etc/letsencrypt/live/safarai.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safarai.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 2m;

    # Xavfsizlik sarlavhalari
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API — to'lov webhooklari va barcha backend route'lar
    location /api/ {
        proxy_pass http://safarai_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Payme/Click webhooklar uchun
        proxy_set_header Authorization $http_authorization;
    }

    # Next.js frontend (App Router)
    location / {
        proxy_pass http://safarai_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js static assets cache
    location /_next/static/ {
        proxy_pass http://safarai_app;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
